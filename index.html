<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boda Mónica y Pablo</title>
<meta property="og:title" content="Invitación Mónica y Pablo · 18 Julio 2026">

<meta property="og:description" content="Nos hace muchísima ilusión compartir este día con vosotros.">

<meta property="og:image" content="https://jimenezmotamonica-hue.github.io/invitaci-n/og.jpg">

<meta property="og:image:secure_url" content="https://jimenezmotamonica-hue.github.io/invitaci-n/og.jpg">

<meta property="og:image:type" content="image/jpeg">

<meta property="og:image:width" content="1200">

<meta property="og:image:height" content="630">

<meta property="og:url" content="https://jimenezmotamonica-hue.github.io/invitaci-n/">

<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

<meta name="twitter:image" content="https://jimenezmotamonica-hue.github.io/invitaci-n/og.jpg">
  <style>

    body {
      margin: 0;
      font-family: 'Georgia', serif;
      color: #4a3f35;
      text-align: center;
      position: relative;
      overflow-x: hidden;
      background-color: #f7f3ef;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('fondo.png');
      background-repeat: no-repeat;
      background-position: center top;
      background-size: cover;
      z-index: -1;
    }

    .section {
      padding: 30px 20px;
      max-width: 700px;
      margin: auto;
    }

    .image {
      width: 100%;
      border-radius: 18px;
      margin: 20px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(4px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      margin-top: 25px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 25px;
      font-weight: normal;
      font-size: 2rem;
    }

    .rsvp-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .rsvp-form input,
    .rsvp-form textarea,
    .rsvp-form select {
      width: 100%;
      padding: 14px;
      border: 1px solid #d8d2c8;
      border-radius: 12px;
      font-size: 16px;
      font-family: Georgia, serif;
      background: #fffdf9;
      box-sizing: border-box;
    }

    .rsvp-form textarea {
      min-height: 120px;
      resize: vertical;
    }

    .bus-label {
      text-align: left;
      margin-top: 5px;
      font-size: 15px;
    }

    button {
      margin-top: 10px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background-color: #c8a97e;
      color: white;
      font-size: 1rem;
      font-family: Georgia, serif;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #b8956d;
    }

    @media (max-width: 768px) {

      body::before {
        background-size: cover;
        background-position: center top;
      }

      .section {
        padding: 20px 12px;
      }

      .card {
        padding: 22px;
      }

      h2 {
        font-size: 1.6rem;
      }

    }

  </style>
</head>

<body>

  <div class="section">
    <img src="invitacion.png" class="image" alt="Invitación">
  </div>

  <div class="section">

    <img src="mapa.png" class="image" alt="Mapa">

    <div class="card">

      <h2>Confirma tu asistencia</h2>

      <form
        action="https://formspree.io/f/mbdwzgvd"
        method="POST"
        class="rsvp-form"
      >

        <input
          type="hidden"
          name="_subject"
          value="Nueva confirmación boda"
        >

        <input
          type="text"
          name="nombre"
          placeholder="Nombre y apellidos"
          required
        >

        <input
          type="number"
          name="asistentes"
          placeholder="Número de asistentes"
          required
        >

        <textarea
          name="alergias"
          placeholder="Alergias o intolerancias"
        ></textarea>

        <label class="bus-label">
          ¿Utilizarás el autobús?
        </label>

        <select name="autobus" required>
          <option value="">Selecciona una opción</option>
          <option value="Sí">Sí</option>
          <option value="No">No</option>
        </select>

        <button type="submit">
          Confirmar asistencia
        </button>

      </form>

    </div>

  </div>

</body>
</html>
